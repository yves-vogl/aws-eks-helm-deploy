apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    chart-name: {{ .Chart.Name }}
    chart-version: {{ .Chart.Version | quote }}
    {{- if .Values.bitbucket }}
    bb-build: {{ .Values.bitbucket.bitbucket_build_number | default "" | quote }}
    {{- end }}
data:
  release: {{ .Release.Name }}
  version: {{ .Chart.Version | quote }}
  {{- if .Values.bitbucket }}
  bitbucket_commit: {{ .Values.bitbucket.bitbucket_commit | default "" | quote }}
  bitbucket_tag: {{ .Values.bitbucket.bitbucket_tag | default "" | quote }}
  {{- end }}
