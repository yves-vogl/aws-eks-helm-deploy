# Phase 6 / CI-02 / CONTEXT D1 — release-please driver.
# On every push to main, googleapis/release-please-action inspects accumulated
# Conventional Commits and opens-or-updates a single Release PR. The PR DOES NOT
# auto-merge (D1); Yves reviews and squash-merges manually. The merged release-PR
# pushes a tag (e.g. v2.0.0) which triggers release.yml (Plan 06-03 + 06-04).
#
# Pitfall #1: This workflow only AUTHORS the Release PR. It does NOT sign or push
# the image. id-token:write is therefore NOT requested here — that permission is
# reserved for release.yml (the only workflow allowed to mint OIDC tokens).
name: release-please

on:
  push:
    branches: [main]

# Top-level permissions are read-only per OpenSSF Scorecard best practice
# (least-privilege GITHUB_TOKEN); release-please needs contents:write +
# pull-requests:write at job level only.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a release-please run mid-PR-update

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    permissions:
      contents: write          # release-please pushes the release branch
      pull-requests: write     # release-please opens/updates the Release PR
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # The project ships its release-please config at the dot-prefixed path
          # `.release-please-config.json` (Phase 6 CONTEXT D1 — enforced by
          # `tests/structural/test_release_please_config.py`). The action's
          # default `config-file:` input is `release-please-config.json` (no
          # dot), so we override it explicitly here; without the override the
          # action errors with "Missing required manifest config:
          # release-please-config.json" on every push to main.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
