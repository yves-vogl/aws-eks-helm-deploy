name: ci

# Phase 6 / CI-01 / SEC-04 / SEC-05 — 7-job parallel fan-out per CONTEXT D9.
# Jobs run independently; failure of any one surfaces the bad job for fast triage.
# Pitfall #1: NO job in this workflow requests id-token:write (PR-triggered jobs
# must not be able to mint OIDC tokens). The release pipeline (release.yml,
# Plan 06-04) is the ONLY workflow allowed to request id-token:write.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint-typecheck:
    name: "lint-typecheck (ruff + mypy)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: ruff format --check
        run: uv run ruff format --check src/ tests/

      - name: mypy --strict
        run: uv run mypy --strict src/aws_eks_helm_deploy

  unit-coverage:
    name: "unit-coverage (100% line+branch)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run unit + structural tests with coverage
        run: >
          uv run pytest tests/unit tests/structural
          -q
          --cov=src/aws_eks_helm_deploy
          --cov-branch
          --cov-fail-under=100
          --cov-report=term-missing

  integration:
    name: "integration (kind + helm)"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install integration dependencies
        run: uv sync --group integration --frozen

      - name: Set up Helm (4.2.x — matches Dockerfile pin)
        # The GitHub-hosted runner's pre-installed helm version is unstable across
        # runner image refreshes; pin to 4.2.x to match the bundled binary in the
        # Dockerfile (HELM_VERSION=4.2.2). Helm v3 EOL is 2026-11-11.
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.2

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run integration tests
        run: uv run pytest tests/integration -m integration --no-cov

  trivy-image:
    name: "trivy-image"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Validate .trivyignore grammar + emit bare sidecar (D2 + SEC-04)
        # The D2 grammar has inline `# expires=… rationale=… reviewer=…` comments
        # for human review hygiene. Trivy does NOT honour inline comments after
        # the CVE ID, so we emit a bare sidecar with comments stripped and point
        # Trivy at it. The grammar enforcement still runs on the canonical file.
        run: bash scripts/trivyignore-check.sh .trivyignore .trivyignore.bare

      - name: Build Docker image
        run: docker build -t aws-eks-helm-deploy:ci-test .

      # Two-pass scan: Trivy v0.71.x has a known interaction where `format: sarif`
      # does not honour the .trivyignore.bare sidecar for the exit-code gate
      # (SARIF output is correctly filtered, but the action still exits non-zero
      # on findings the sidecar should suppress). Workaround: run the gate as
      # `format: table` (where ignorefile + exit-code work as documented), then
      # run a second scan in SARIF mode purely for Code Scanning visibility.
      # Trivy version pinned to v0.71.2 (newer than the action's v0.70.0 default)
      # so the gate uses the latest stable scanner.
      - name: Run Trivy image scan (gate — table format honours .trivyignore)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: aws-eks-helm-deploy:ci-test
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore.bare
          version: v0.71.2

      - name: Run Trivy image scan (SARIF — visibility only, no gate)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: aws-eks-helm-deploy:ci-test
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: .trivyignore.bare
          version: v0.71.2

      - name: Upload SARIF to Code Scanning
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif

  trivy-dockerfile:
    name: "trivy-dockerfile"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Validate .trivyignore grammar + emit bare sidecar (D2 + SEC-04)
        run: bash scripts/trivyignore-check.sh .trivyignore .trivyignore.bare

      - name: Run Trivy config scan (Dockerfile + IaC)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore.bare
          # Exclude test fixture charts — they intentionally use loose security
          # contexts for test ergonomics and are NEVER deployed to a cluster.
          # Production chart consumers are responsible for their own k8s
          # securityContext hardening; the pipe itself just helm-upgrades.
          # `test/acceptance` holds the chart fixture (KSV-0014/KSV-0118 findings);
          # `tests/fixtures` holds Python fixtures; `.planning` holds threat-model
          # walkthroughs that may quote loose example contexts.
          skip-dirs: test/acceptance,tests/fixtures,.planning

      - name: Run Trivy secret scan (filesystem)
        # skip-dirs excludes:
        #  - `.venv/`: uv-generated virtualenv with third-party libraries that
        #    embed placeholder mock-secrets (e.g. `moto`'s dummy AWS credentials).
        #    These are not project secrets and surfaced as Critical findings in
        #    the Security tab (alert #163 etc.).
        #  - `tests/fixtures/`: chart fixtures that intentionally use dummy
        #    secret-shaped strings for test ergonomics.
        #  - `.planning/`: planning docs may quote example credentials in
        #    threat-model walkthroughs.
        # `continue-on-error: true` stays as a defense-in-depth so a single
        # false-positive can never block a release; the SARIF upload still
        # surfaces real findings to the Security tab.
        continue-on-error: true
        id: trivy-secret
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-secret.sarif
          skip-dirs: .venv,tests/fixtures,.planning

      - name: Upload secret-scan SARIF to Code Scanning
        # Only upload when Trivy actually wrote a SARIF file. With zero secret-scan
        # findings Trivy may exit without producing the output, and the upload step
        # would otherwise fail on the missing file path.
        if: always() && hashFiles('trivy-secret.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-secret.sarif

  pip-audit:
    name: "pip-audit"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run pip-audit with stale-suppression check
        run: bash scripts/pip-audit-with-stale-check.sh

  acceptance:
    name: "acceptance (docker run image)"
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install acceptance dependencies
        run: uv sync --group acceptance --frozen

      - name: Build Docker image
        run: docker build -t aws-eks-helm-deploy:ci-test .

      - name: Run acceptance tests
        # Override the default `addopts = "-m 'unit'"` from pyproject.toml so the
        # acceptance-marked tests are actually selected (otherwise pytest exits 5
        # "no tests collected"). Use `-m acceptance` to opt back in.
        run: uv run pytest tests/acceptance -q --no-cov -m acceptance

  docs-drift:
    name: "docs-drift (variables.md regen check)"
    runs-on: ubuntu-24.04
    # Phase 7 / Plan 07-03 / DOC-02 SC-2 — 8th job mirroring D9 fan-out shape.
    # Regenerates docs/reference/variables.md from src/aws_eks_helm_deploy/settings.py
    # and fails if the regenerated file drifts from the committed copy.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Check variables.md drift
        run: bash scripts/check-variables-drift.sh
