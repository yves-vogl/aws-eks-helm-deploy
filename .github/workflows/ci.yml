name: ci

# Phase 6 / CI-01 / SEC-04 / SEC-05 — 7-job parallel fan-out per CONTEXT D9.
# Jobs run independently; failure of any one surfaces the bad job for fast triage.
# Pitfall #1: NO job in this workflow requests id-token:write (PR-triggered jobs
# must not be able to mint OIDC tokens). The release pipeline (release.yml,
# Plan 06-04) is the ONLY workflow allowed to request id-token:write.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint-typecheck:
    name: "lint-typecheck (ruff + mypy)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: ruff format --check
        run: uv run ruff format --check src/ tests/

      - name: mypy --strict
        run: uv run mypy --strict src/aws_eks_helm_deploy

  unit-coverage:
    name: "unit-coverage (100% line+branch)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run unit + structural tests with coverage
        run: >
          uv run pytest tests/unit tests/structural
          -q
          --cov=src/aws_eks_helm_deploy
          --cov-branch
          --cov-fail-under=100
          --cov-report=term-missing

  integration:
    name: "integration (kind + helm)"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install integration dependencies
        run: uv sync --group integration --frozen

      - name: Create kind cluster
        uses: helm/kind-action@99576bfa6ddf9a8e612d83b513da5a75875caced # v1.9.0

      - name: Run integration tests
        run: uv run pytest tests/integration -m integration --no-cov

  trivy-image:
    name: "trivy-image"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Docker image
        run: docker build -t aws-eks-helm-deploy:ci-test .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: aws-eks-helm-deploy:ci-test
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-image.sarif

  trivy-dockerfile:
    name: "trivy-dockerfile"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Trivy config scan (Dockerfile + IaC + chart fixtures)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Run Trivy secret scan (filesystem)
        id: trivy-secret
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-secret.sarif

      - name: Upload secret-scan SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-secret.sarif

  pip-audit:
    name: "pip-audit"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run pip-audit with stale-suppression check
        run: bash scripts/pip-audit-with-stale-check.sh

  acceptance:
    name: "acceptance (docker run image)"
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install acceptance dependencies
        run: uv sync --group acceptance --frozen

      - name: Build Docker image
        run: docker build -t aws-eks-helm-deploy:ci-test .

      - name: Run acceptance tests
        run: uv run pytest tests/acceptance -q --no-cov
