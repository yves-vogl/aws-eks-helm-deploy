name: docs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (full history needed for mike to push gh-pages)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure git author for mike push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra docs

      - name: Generate variables reference (RESEARCH Q10 pitfall #4 — must run before strict build)
        run: uv run python scripts/generate-variables-doc.py

      - name: Verify no drift in variables doc
        run: bash scripts/check-variables-drift.sh

      - name: Build docs (strict — fail on warnings)
        run: uv run --extra docs mkdocs build --strict

      - name: Deploy v2 + latest alias to gh-pages (mike)
        if: github.ref == 'refs/heads/main'
        run: uv run --extra docs mike deploy --push --update-aliases v2 latest

      - name: Deploy versioned tag alias to gh-pages (mike)
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run --extra docs mike deploy --push --update-aliases ${GITHUB_REF_NAME%.*.*} latest
