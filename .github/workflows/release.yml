# Phase 6 / IMAGE-04 / IMAGE-05 / CI-03 — Release pipeline (build half).
# Triggered when release-please's Release PR is merged and pushes a `v*` tag.
# Builds linux/amd64 + linux/arm64 NATIVELY on ubuntu-24.04 + ubuntu-24.04-arm
# runners (NO QEMU — see RESEARCH §Common Pitfalls #2 / D4).
#
# This file is the BUILD half. Plan 06-04 will EXTEND this workflow by appending
# a `sign-and-attest` job (Cosign keyless + Syft SBOM + SLSA provenance) that
# depends on `build` via `needs: [build]`.
#
# Pitfall #1 / Pitfall #4: id-token:write is declared at workflow level so the
# build job can authenticate to GHCR via OIDC AND so Plan 06-04's sign step can
# request a Fulcio cert. This is the ONLY workflow allowed to declare id-token:write.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re-)release (e.g. v2.0.0)"
        required: true

permissions:
  contents: write          # GitHub Release creation (Plan 06-04 extension)
  packages: write          # push image + cosign signature artifact to GHCR
  id-token: write          # OIDC token for Fulcio cert issuance (Plan 06-04)
  attestations: write      # SLSA provenance (Plan 06-04)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # Pitfall #4: never cancel a half-pushed release

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME resolves to: ghcr.io/yves-vogl/aws-eks-helm-deploy
  IMAGE_NAME: ${{ github.repository_owner }}/aws-eks-helm-deploy

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_suffix: arm64
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export.outputs.digest-arm64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OCI metadata (IMAGE-05)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=aws-eks-helm-deploy
            org.opencontainers.image.description=Deploy Helm charts to AWS EKS from Bitbucket Pipelines
            org.opencontainers.image.licenses=Apache-2.0
          # source, revision, version, created are auto-populated by metadata-action

      - name: Build and push per-arch image by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # push-by-digest=true: Plan 06-04's sign-and-attest fan-in job
          # assembles the multi-arch manifest from the per-arch digests via
          # `docker buildx imagetools create`.
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # BuildKit auto-sets TARGETARCH based on --platform; no explicit
          # --build-arg needed for the multi-arch stage conversions in Dockerfile.

      - name: Export per-arch digest as job output
        id: export
        run: |
          echo "digest-${{ matrix.arch_suffix }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  sign-and-attest:
    name: sign + SBOM + SLSA + publish manifest
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write        # create / edit GitHub Release
      packages: write        # push manifest + cosign signature OCI artifact to GHCR
      id-token: write        # OIDC token for Fulcio cert issuance (SEC-01)
      attestations: write    # SLSA provenance store (SEC-03)
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.3"   # match Dockerfile pin (Phase 4 D8 carry-forward)

      - name: Compute version tags
        id: tags
        # ${{ github.ref_name }} is the tag (e.g. v2.0.0). Strip the leading "v" for SemVer.
        # The :2 rolling-major tag tracks the current v2.x release per CONTEXT D10 / MIG-01.
        run: |
          set -euo pipefail
          REF="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ inputs.tag }}"
          fi
          # Strip leading "v" — fail if absent (defensive)
          [[ "$REF" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[A-Za-z0-9.-]+)?$ ]] || { echo "Tag does not match vMAJOR.MINOR.PATCH[-PRE]: $REF" >&2; exit 1; }
          MAJOR="${BASH_REMATCH[1]}"
          VERSION="${REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Assemble multi-arch manifest from per-arch digests
        id: manifest
        # docker buildx imagetools create handles digest-based assembly (RESEARCH §Multi-arch).
        # The three tags (vX.Y.Z, :MAJOR, :latest) are applied at the same manifest digest.
        run: |
          set -euo pipefail
          DIGEST_AMD64="${{ needs.build.outputs.digest-amd64 }}"
          DIGEST_ARM64="${{ needs.build.outputs.digest-arm64 }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.tags.outputs.version }}"
          MAJOR="${{ steps.tags.outputs.major }}"

          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:${MAJOR}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}@${DIGEST_AMD64}" \
            "${IMAGE}@${DIGEST_ARM64}"

          # Resolve the assembled manifest digest (same for all three tags).
          MANIFEST_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "manifest-digest=${MANIFEST_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image-ref=${IMAGE}@${MANIFEST_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Smoke-test multi-arch manifest (Pitfall #2 / R2 mitigation)
        # `imagetools inspect` lists the platforms baked into the manifest.
        # Assertion: both linux/amd64 AND linux/arm64 present as real entries
        # (NOT 'unknown/unknown' which is the QEMU-broken-arm64 telltale).
        run: |
          set -euo pipefail
          INSPECT_OUT=$(docker buildx imagetools inspect "${{ steps.manifest.outputs.image-ref }}")
          echo "$INSPECT_OUT"
          echo "$INSPECT_OUT" | grep -F 'linux/amd64'
          echo "$INSPECT_OUT" | grep -F 'linux/arm64'
          # Defensive: fail if the manifest has any 'unknown' platform entry
          if echo "$INSPECT_OUT" | grep -E 'Platform:.*unknown'; then
            echo "ERROR: manifest contains an 'unknown' platform entry — Pitfall #2 (QEMU broken arm64?)" >&2
            exit 1
          fi

      - name: Sign manifest with Cosign keyless (SEC-01)
        # --bundle is REQUIRED (Pitfall #4): without it, verification needs Rekor online.
        # --yes accepts the Fulcio TOS (required in non-interactive CI).
        env:
          IMAGE_REF: ${{ steps.manifest.outputs.image-ref }}
        run: |
          cosign sign --yes --bundle cosign.bundle "${IMAGE_REF}"

      - name: Generate SPDX SBOM (SEC-02)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.manifest.outputs.image-ref }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Generate CycloneDX SBOM (SEC-02)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.manifest.outputs.image-ref }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false

      - name: Attest SPDX SBOM via Cosign (CONTEXT D8)
        env:
          IMAGE_REF: ${{ steps.manifest.outputs.image-ref }}
        run: |
          cosign attest --yes --bundle sbom.spdx.bundle \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_REF}"

      - name: Attest CycloneDX SBOM via Cosign (CONTEXT D8)
        env:
          IMAGE_REF: ${{ steps.manifest.outputs.image-ref }}
        run: |
          cosign attest --yes --bundle sbom.cyclonedx.bundle \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            "${IMAGE_REF}"

      - name: Attach SLSA build provenance (SEC-03)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.manifest-digest }}
          push-to-registry: true

      - name: Update GitHub Release with supply-chain artifacts
        # release-please already created the Release on PR merge; we just upload
        # supply-chain artifacts and amend the notes (idempotent — works whether
        # release-please pre-created the Release or this is a workflow_dispatch re-run).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ${{ steps.manifest.outputs.image-ref }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" \
              sbom.spdx.json sbom.cyclonedx.json \
              cosign.bundle sbom.spdx.bundle sbom.cyclonedx.bundle \
              --clobber
            gh release edit "v${VERSION}" --notes-file <(gh release view "v${VERSION}" --json body --jq .body; echo -e "\n\n## Supply chain artifacts\n\n- Manifest: \`${IMAGE_REF}\`\n- Cosign verify: \`cosign verify --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' --certificate-oidc-issuer https://token.actions.githubusercontent.com ${IMAGE_REF}\`\n- SBOM (SPDX): \`cosign verify-attestation --type spdxjson ${IMAGE_REF}\`\n- SBOM (CycloneDX): \`cosign verify-attestation --type cyclonedx ${IMAGE_REF}\`")
          else
            echo "WARNING: GitHub Release v${VERSION} not found — release-please may have failed or this is workflow_dispatch" >&2
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes \
              sbom.spdx.json sbom.cyclonedx.json \
              cosign.bundle sbom.spdx.bundle sbom.cyclonedx.bundle
          fi

  benchmark-cold-start:
    name: benchmark cold-start (IMAGE-06)
    needs: [sign-and-attest]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run benchmark
        run: |
          chmod +x scripts/benchmark-cold-start.sh
          bash scripts/benchmark-cold-start.sh \
            "ghcr.io/yves-vogl/aws-eks-helm-deploy:${{ github.ref_name }}" \
            5 \
            cold-start-results.json

      - name: Upload benchmark JSON artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cold-start-benchmark-${{ github.ref_name }}
          path: cold-start-results.json
          retention-days: 90
