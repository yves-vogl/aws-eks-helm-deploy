# Phase 6 / SEC-07 — Daily Trivy rescan of the published GHCR image.
# Scans :latest AND :2 tags. CRITICAL+HIGH findings → SARIF upload + auto-issue.
# Pitfall #1: scheduled workflow does NOT request id-token:write (cron is not PR-triggered
# but the discipline applies — no OIDC token elevation outside release.yml).
name: security-rescan

on:
  schedule:
    - cron: '17 6 * * *'  # daily ~06:17 UTC (off the :00/:30 mark); 07:17 Berlin winter / 08:17 summer
  workflow_dispatch:

# Top-level permissions are read-only per OpenSSF Scorecard best practice
# (least-privilege GITHUB_TOKEN); SARIF upload + issue creation hoisted to job.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rescan:
    name: trivy rescan (${{ matrix.tag }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # SARIF upload to Code Scanning
      issues: write           # auto-issue creation on CRITICAL/HIGH findings
    strategy:
      fail-fast: false
      matrix:
        tag: [latest, "2"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Probe image existence
        id: probe
        run: |
          set -uo pipefail
          IMAGE="ghcr.io/yves-vogl/aws-eks-helm-deploy"
          MANIFEST_URL="https://ghcr.io/v2/yves-vogl/aws-eks-helm-deploy/manifests/${{ matrix.tag }}"
          STATUS=$(curl -sSL -o /dev/null -w '%{http_code}' \
            -H 'Accept: application/vnd.oci.image.index.v1+json' \
            -H 'Accept: application/vnd.docker.distribution.manifest.list.v2+json' \
            "${MANIFEST_URL}" || echo "000")
          if [[ "$STATUS" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Image :${{ matrix.tag }} not found (HTTP ${STATUS}) — skipping rescan"
          fi

      - name: Trivy scan
        if: steps.probe.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/yves-vogl/aws-eks-helm-deploy:${{ matrix.tag }}
          format: sarif
          output: trivy-${{ matrix.tag }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'        # rescan informs; does NOT fail the workflow
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload SARIF to Code Scanning
        if: steps.probe.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-${{ matrix.tag }}.sarif
          category: trivy-rescan-${{ matrix.tag }}

      - name: Create deduplicated GitHub Issues for findings
        if: steps.probe.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/rescan-issue-creator.py \
            --sarif trivy-${{ matrix.tag }}.sarif \
            --tag '${{ matrix.tag }}' \
            --repo '${{ github.repository }}'
