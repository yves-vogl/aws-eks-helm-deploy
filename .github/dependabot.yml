# Phase 6 / CI-05 / SEC-08 / CONTEXT D6 + RESEARCH C3 correction.
# Commit-message prefix convention:
#   pip ecosystem        → "chore" (C3 — Python dep bumps must NOT trigger release-please patches)
#   docker ecosystem     → "fix" (SEC-08 — base-image bumps DO drive release-please → freshly-scanned republish)
#   github-actions       → "chore" (action SHA bumps are CI-only, not release-affecting)
# Grouping reduces PR noise per D6.

version: 2

updates:
  # ── Python dependencies (pyproject.toml + uv.lock) ────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      # C3 correction: chore prefix prevents release-please from cutting a
      # patch release on every Python dep bump.
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-runtime:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      python-dev:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # ── Dockerfile base images (digest pins) ──────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      # SEC-08 contract: fix(deps): bump base image → release-please patch
      # → release.yml re-publishes a freshly-scanned image to GHCR.
      prefix: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker-base:
        patterns:
          - "python"
          - "debian*"

  # ── GitHub Actions (.github/workflows/*.yml) ──────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns:
          - "*"
