<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="aws-eks-helm-deploy">
  <title>aws-eks-helm-deploy</title>
  <desc>A ship's wheel — the Helm motif — over a Kubernetes-blue to AWS-orange gradient, marking the pipe that steers Helm charts into AWS EKS clusters from Bitbucket Pipelines.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#326CE5"/>
      <stop offset="1" stop-color="#FF9900"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="240" height="240" rx="36" fill="url(#bg)"/>

  <g transform="translate(120 120)" fill="none" stroke="url(#ring)" stroke-linecap="round" stroke-linejoin="round">
    <circle r="58" stroke-width="9"/>
    <circle r="42" stroke-width="6"/>
    <g stroke-width="11">
      <line x1="0" y1="-58" x2="0" y2="-86"/>
      <line x1="0" y1="58" x2="0" y2="86"/>
      <line x1="-58" y1="0" x2="-86" y2="0"/>
      <line x1="58" y1="0" x2="86" y2="0"/>
      <line x1="-41" y1="-41" x2="-61" y2="-61"/>
      <line x1="41" y1="41" x2="61" y2="61"/>
      <line x1="41" y1="-41" x2="61" y2="-61"/>
      <line x1="-41" y1="41" x2="-61" y2="61"/>
    </g>
    <g stroke-width="4" opacity="0.9">
      <line x1="0" y1="-42" x2="0" y2="-16"/>
      <line x1="0" y1="42" x2="0" y2="16"/>
      <line x1="-42" y1="0" x2="-16" y2="0"/>
      <line x1="42" y1="0" x2="16" y2="0"/>
    </g>
    <circle r="16" fill="#ffffff" stroke="none"/>
    <circle r="6" fill="#326CE5" stroke="none"/>
  </g>
</svg>
